name: Build QDM

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: node scripts/fetch-yt-dlp.js
      - run: npm run tauri:build:win
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
      - uses: actions/upload-artifact@v7
        with:
          name: QDM-Windows
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: node scripts/fetch-yt-dlp.js
      - run: npm run tauri:build:mac
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
      - uses: actions/upload-artifact@v7
        with:
          name: QDM-macOS
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
          retention-days: 30

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev
      - run: npm ci
      - run: node scripts/fetch-yt-dlp.js
      - run: npm run tauri:build:linux
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
      - uses: actions/upload-artifact@v7
        with:
          name: QDM-Linux
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          retention-days: 30

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true
      - run: find artifacts -type f | sort
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.tar.gz
            artifacts/**/*.AppImage
            artifacts/**/*.deb
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Quantum Download Manager ${{ github.ref_name }}

            ### Downloads

            | Platform | File | Description |
            |----------|------|-------------|
            | 🪟 Windows | `*_x64_en-US.msi` | Windows Installer (MSI) |
            | 🪟 Windows | `*_x64-setup.exe` | Windows Installer (NSIS) |
            | 🍎 macOS | `*.dmg` | macOS Disk Image (Apple Silicon) |
            | 🐧 Linux | `*.AppImage` | Universal Linux (x64) |
            | 🐧 Linux | `*.deb` | Debian/Ubuntu (x64) |

            ### Browser Extension

            Install the Chrome extension from the `extension/chrome/` directory via **chrome://extensions → Load unpacked**.

            ### macOS Note

            The app is not code-signed. If macOS says it is damaged, run:
            ```
            xattr -cr /Applications/Quantum\ Download\ Manager.app
            ```

            ---
            *Built with ⚡ Tauri 2 by GitHub Actions*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
